<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title">Access</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="../endpoints.js"></script>
</head>
<body>

    <!-- main access -->
    <section id="main-access">
        <h1 id="access-message">Create an Alexicon account to access YipNet | Login into YipNet with your Alexicon account</h1>
        <div id="access-step-1">
            <input type="email" placeholder="Email" id="email" autocomplete="email" pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$">
            <input type="password" placeholder="Password" id="password" pattern="^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*\W)(?!.* ).{8,128}$">
            <button id="password-show"></button>
        </div>
        <div id="access-step-2">
            <input type="text" placeholder="First name" id="first-name" autocomplete="name">
            <input type="text" placeholder="Last name" id="last-name">
            <input type="text" placeholder="Nickname" id="nickname">
            <div class="birthday">
                <input type="date" id="birthday" required>
            </div>
            <div class="genders">
                <label class="gender-label"><input type="radio" name="gender" value="male">Male</label>
                <label class="gender-label"><input type="radio" name="gender" value="female">Female</label>
                <label class="gender-label"><input type="radio" name="gender" value="other">Other:</label>
            </div>
            <input type="text" placeholder="Gender..." id="other-gender" pattern="^[a-zA-Z]+$">
        </div>
        <span id="micro-message"></span>

        <div class="end-buttons">
            <p><span id="access-switch-text"></span> <span id="access-switch-btn"></span></p>
            <div>
                <button id="login-btn">Login</button>
                <button id="next-btn">Next</button>
                <button id="arrow-back-btn">[arrow back]</button>
                <button id="register-btn">Create account</button>
            </div>
        </div>
    </section>

    <!-- verification -->
    <section id="verification">
        <h1 id="verify-title"></h1>
        <hr/>
        <h2>Please verify your email</h2>

        <p id="verify-text"></p>
        <p class="resend-count" id="watch">Did't receive the email? Resend in 00:00.</p>

        <button id="re-send-email">Resend email</button>
        <span id="micro-message-verify"></span>
    </section>

    <!-- verify code -->
    <section id="verify-code">
        <h1 id="verify-code-title"></h1>
        <p id="verify-code-message"></p>
        <button id="re-login-register">Login / Register</button>
    </section>

</body>
<script src="./app.js"></script>
<script src="./access.js"></script>
<script src="./verify.js"></script>

</html>
